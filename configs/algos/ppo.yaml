# ==========================================================
# Algorithm
# ==========================================================

algorithm:
  name: "ppo"

  shared_policy: False
  centralized_critic: False #Independent PPO → centralized_critic=False; MAPPO / CTDE → centralized_critic=True
  recurrent: false

# ==========================================================
# Training
# ==========================================================

training:
  total_timesteps: 1000000

  gamma: 0.99
  gae_lambda: 0.95

  learning_rate: 0.0001

  batch_size: 512
  mini_batch_size: 128

  ppo_epochs: 10
  clip_range: 0.2

  entropy_coef: 0.01
  value_loss_coef: 0.5
  max_grad_norm: 0.5

# ==========================================================
# Evaluation
# ==========================================================

evaluation:
  enabled: true
  eval_interval: 10000
  eval_episodes: 10

# ==========================================================
# Logging
# ==========================================================

logging:
  use_tensorboard: false
  use_wandb: false

  log_type: "independent" # "mean" or "max" or "independent"
  log_interval: 256
  save_model_interval: 50000

# ==========================================================
# Device
# ==========================================================

device:
  use_cuda: true
  gpu_id: 0

# ==========================================================
# Model
# ==========================================================

model:
  actor_hidden_sizes: [256, 256]
  critic_hidden_sizes: [256, 256]
  activation: "relu"