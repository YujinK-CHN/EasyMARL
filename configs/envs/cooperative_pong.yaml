# ==========================================================
# Cooperative Pong (PettingZoo Atari)
# ==========================================================

project_name: "pettingzoo-baselines"
experiment_name: "cooperative_pong"

seed: 42
repeat: 3

env:
  family: "atari"
  name: "cooperative_pong_v6"

  # Use parallel API when available
  parallel: true

  # PettingZoo environment constructor arguments
  kwargs:
    ball_speed: 9
    left_paddle_speed: 12
    right_paddle_speed: 12
    cake_paddle: true
    max_cycles: 900
    bounce_randomness: false
    max_reward: 100
    off_screen_penalty: -10
    render_mode: null
    render_ratio: 2
    render_fps: 15