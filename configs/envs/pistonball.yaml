# ==========================================================
# Pistonball (PettingZoo)
# ==========================================================

env:
  family: "butterfly"
  name: "pistonball_v6"
  seed: 42

  parallel: True

  # PettingZoo environment constructor arguments
  kwargs:
    n_pistons: 5
    time_penalty: -0.1
    continuous: True
    random_drop: True
    random_rotate: True
    ball_mass: 0.75
    ball_friction: 0.3
    ball_elasticity: 1.5
    max_cycles: 125